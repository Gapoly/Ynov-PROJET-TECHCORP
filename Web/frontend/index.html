<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat IA</title>
    <link rel="stylesheet" href="/styles.css?v=dark-2">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <strong>Chat IA</strong>
            <span id="status-detail">Connexion...</span>
          </div>
        </div>

        <div class="top-actions">
          <span id="status-pill" class="status-dot neutral" title="Etat du serveur"></span>
          <button id="theme-button" class="icon-button theme-button" type="button" aria-label="Theme sombre" title="Theme sombre">☾</button>
          <button id="settings-button" class="icon-button" type="button" aria-label="Parametres" title="Parametres">⚙</button>
          <button id="clear-button" class="text-button" type="button">Nouveau chat</button>
        </div>
      </header>

      <section class="chat-surface" aria-label="Conversation">
        <div id="messages" class="messages" aria-live="polite">
          <div class="empty-state">
            <strong>Comment puis-je t'aider ?</strong>
          </div>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-box">
            <textarea id="message-input" rows="1" placeholder="Message" required></textarea>
            <button id="send-button" type="submit" aria-label="Envoyer" title="Envoyer">↑</button>
          </div>
        </form>
      </section>

      <dialog id="settings-dialog" class="settings-dialog">
        <form method="dialog" class="settings-panel">
          <div class="settings-head">
            <strong>Parametres</strong>
            <button class="icon-button" value="close" aria-label="Fermer" title="Fermer">×</button>
          </div>

          <label for="model-input">Modele</label>
          <input id="model-input" type="text" value="phi3.5-financial" autocomplete="off">

          <label for="temperature-input">Temperature <output id="temperature-value">0.70</output></label>
          <input id="temperature-input" type="range" min="0" max="1.5" step="0.05" value="0.7">

          <label for="tokens-input">Tokens max</label>
          <input id="tokens-input" type="number" min="32" max="2048" value="768">
        </form>
      </dialog>
    </main>

    <script src="/app.js?v=dark-2"></script>
  </body>
</html>
